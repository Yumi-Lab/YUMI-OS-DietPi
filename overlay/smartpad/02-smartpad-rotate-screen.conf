# SmartPad Screen Rotation Configuration
# Rotates the display 180 degrees (upside-down)
# This uses the modesetting driver which is the default on Debian 12+
# For Debian 11, fbdev is still supported as fallback

Section "Monitor"
    Identifier  "DSI-1"
    Option      "Rotate" "inverted"
EndSection

Section "Monitor"
    Identifier  "HDMI-A-1"
    Option      "Rotate" "inverted"
EndSection

Section "Monitor"
    Identifier  "default"
    Option      "Rotate" "inverted"
EndSection
