# SmartPad Touch Input Rotation Configuration
# Rotates touch input 180 degrees to match screen rotation
# Compatible with Debian 11 (evdev) and Debian 12/13 (libinput)

# For libinput driver (Debian 12+ default)
Section "InputClass"
    Identifier "libinput touchscreen rotation"
    MatchIsTouchscreen "on"
    MatchDevicePath "/dev/input/event*"
    Driver "libinput"
    # Transformation matrix for 180 degree rotation
    Option "CalibrationMatrix" "-1 0 1 0 -1 1 0 0 1"
    Option "TransformationMatrix" "-1 0 1 0 -1 1 0 0 1"
EndSection

# For evdev driver (Debian 11 fallback)
Section "InputClass"
    Identifier "evdev touchscreen rotation"
    MatchIsTouchscreen "on"
    MatchDevicePath "/dev/input/event*"
    Driver "evdev"
    Option "CalibrationMatrix" "-1 0 1 0 -1 1 0 0 1"
EndSection
